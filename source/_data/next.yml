# NexT 5.1.4 config (legacy), close to 2018-12/2019-01 appearance

# Menu
# NOTE: NexT v5.1.4 template calls url_for() BEFORE trim().
# If you write `/ || home` (with spaces), it becomes `/%20` and causes 404.
# So we remove spaces around `||` here.
menu:
  home: /||home
  archives: /archives/||archive
  tags: /tags/||tags
  categories: /categories/||th
  #about: /about/||user

menu_icons:
  enable: true

# Theme scheme (2018 used Mist)
scheme: Mist

# Sidebar
sidebar:
  position: left
  display: post
  offset: 12
  b2t: false
  scrollpercent: false
  onmobile: false

# Effects
fancybox: true
motion:
  enable: true
  async: false

# Background
canvas_nest: true

# Math
mathjax:
  enable: true
  per_page: false

# Mermaid
mermaid:
  enable: true

# Live2D "little cat" widget assets are shipped under source/live2dw.
# The snippet injection is handled by scripts/inject-live2d.js
